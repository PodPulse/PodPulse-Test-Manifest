# Plain deployment with no GitOps or Helm labels.
# The agent will detect strategy=RawManifest.
# kubectl apply -f raw/cluster-apply.yaml
apiVersion: apps/v1
kind: Deployment
metadata:
  name: oom-raw
  namespace: podpulse-test
  labels:
    app: oom-raw
spec:
  replicas: 1
  selector:
    matchLabels:
      app: oom-raw
  template:
    metadata:
      labels:
        app: oom-raw
    spec:
      restartPolicy: Always
      containers:
        - name: oom-raw-container
          image: polinux/stress
          args:
            - stress
            - --vm
            - "1"
            - --vm-bytes
            - "200M"
            - --vm-keep
          resources:
            requests:
              memory: "30Mi"
              cpu: "50m"
            limits:
              memory: "50Mi"   # intentionally low → OOMKilled
              cpu: "100m"
