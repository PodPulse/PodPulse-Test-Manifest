# Identical to cluster-apply: for Raw there are no dynamically injected labels.
# The matcher will look for "oom-raw-container" + namespace "podpulse-test" + resources block → score ≥ 0.70.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: oom-raw
  namespace: podpulse-test
spec:
  replicas: 1
  selector:
    matchLabels:
      app: oom-raw
  template:
    metadata:
      labels:
        app: oom-raw
    spec:
      containers:
        - name: oom-raw-container
          image: polinux/stress
          args:
            - stress
            - --vm
            - "1"
            - --vm-bytes
            - "200M"
            - --vm-keep
          resources:
            requests:
              memory: "30Mi"
              cpu: "50m"
            limits:
              memory: "50Mi"
              cpu: "100m"
