# Identical to cluster-apply: for Raw there are no dynamically injected labels.
# The matcher will look for "payment-api" container + namespace "billing" + resources block → score ≥ 0.70.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: payment-api
  namespace: billing
spec:
  replicas: 3
  selector:
    matchLabels:
      app: payment-api
  template:
    metadata:
      labels:
        app: payment-api
    spec:
      containers:
        - name: payment-api
          image: polinux/stress
          args:
            - stress
            - --vm
            - "1"
            - --vm-bytes
            - "200M"
            - --vm-keep
          resources:
            requests:
              memory: "30Mi"
              cpu: "50m"
            limits:
              memory: "50Mi"
              cpu: "100m"
