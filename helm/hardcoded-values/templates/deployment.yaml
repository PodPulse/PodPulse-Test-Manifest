# File as it exists in the Helm repo (templates/deployment.yaml without Helm labels).
# This is what ManifestResolver will scan on GitHub.
# The matcher will look for "order-service" container in the content → match.
# Note: in a real Helm chart this would use {{ .Values.* }} — container name is hardcoded
#       here so that YamlContentMatcher can match it.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: order-service
  namespace: commerce
spec:
  replicas: 1
  selector:
    matchLabels:
      app: order-service
  template:
    metadata:
      labels:
        app: order-service
    spec:
      containers:
        - name: order-service
          image: polinux/stress
          args: ["stress", "--vm", "1", "--vm-bytes", "200M", "--vm-keep"]
          resources:
            requests:
              memory: "30Mi"
              cpu: "50m"
            limits:
              memory: 128Mi
              cpu: "100m"
