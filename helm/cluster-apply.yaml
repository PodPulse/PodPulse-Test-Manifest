# Simulates what `helm install` injects onto live resources at render time.
# kubectl apply -f helm/cluster-apply.yaml
apiVersion: apps/v1
kind: Deployment
metadata:
  name: oom-helm
  namespace: podpulse-test
  labels:
    # Labels injected by Helm at render time (not present in values.yaml/templates in the repo)
    app.kubernetes.io/managed-by: Helm
    app.kubernetes.io/instance: podpulse-helm-test
    helm.sh/chart: oom-test-1.0.0
    app: oom-helm
spec:
  replicas: 1
  selector:
    matchLabels:
      app: oom-helm
  template:
    metadata:
      labels:
        app.kubernetes.io/managed-by: Helm
        app.kubernetes.io/instance: podpulse-helm-test
        helm.sh/chart: oom-test-1.0.0
        app: oom-helm
    spec:
      restartPolicy: Always
      containers:
        - name: oom-helm-container
          image: polinux/stress
          args:
            - stress
            - --vm
            - "1"
            - --vm-bytes
            - "200M"
            - --vm-keep
          resources:
            requests:
              memory: "30Mi"
              cpu: "50m"
            limits:
              memory: "50Mi"   # intentionally low → OOMKilled
              cpu: "100m"
