# Simulates what ArgoCD injects onto live resources at deploy time.
# kubectl apply -f argo/cluster-apply.yaml
apiVersion: apps/v1
kind: Deployment
metadata:
  name: oom-argo
  namespace: podpulse-test
  labels:
    # Labels injected by ArgoCD at deploy time (not present in the repo)
    argocd.argoproj.io/app-name: podpulse-argo-test
    app: oom-argo
spec:
  replicas: 1
  selector:
    matchLabels:
      app: oom-argo
  template:
    metadata:
      labels:
        argocd.argoproj.io/app-name: podpulse-argo-test
        app: oom-argo
    spec:
      restartPolicy: Always
      containers:
        - name: oom-argo-container
          image: polinux/stress
          args:
            - stress
            - --vm
            - "1"
            - --vm-bytes
            - "200M"
            - --vm-keep
          resources:
            requests:
              memory: "30Mi"
              cpu: "50m"
            limits:
              memory: "50Mi"   # intentionally low → OOMKilled
              cpu: "100m"
